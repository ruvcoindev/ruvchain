name: Build OpenWrt for Xiaomi AX3000T

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-openwrt:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncurses-dev \
          flex \
          bison \
          gawk \
          gcc-multilib \
          git \
          rsync \
          python3 \
          unzip

    - name: Clone OpenWrt
      run: |
        git clone https://github.com/openwrt/openwrt.git
        cd openwrt
        git checkout v23.05.5
  
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/staging_dir
          openwrt/build_dir
        key: ${{ runner.os }}-openwrt-${{ hashFiles('openwrt/feeds.conf.default') }}
        

    - name: Configure feeds
      run: |
        cd openwrt
        echo 'src-git ruvchain https://github.com/ruvcoindev/package.git' >> feeds.conf.default
        echo 'src-git ruvchain-connector https://github.com/ruvcoindev/luci.git' >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply config for Xiaomi AX3000T
      run: |
        cd openwrt
        cat > .config << EOF
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_mt7981=y
        CONFIG_TARGET_mediatek_mt7981_ax3000t=y
        CONFIG_PACKAGE_ruvchain=y
        CONFIG_PACKAGE_ruvchainctl=y
        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_libopenssl=y
        EOF

    - name: Build image
      run: |
        cd openwrt
        make defconfig
        make -j$(nproc) download
        make -j$(($(nproc) + 1)) V=s

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-ax3000t
        path: |
          openwrt/bin/targets/mediatek/mt7981/openwrt-mediatek-mt7981-xiaomi_ax3000t-squashfs-sysupgrade.bin
          openwrt/bin/packages/aarch64_cortex-a53/ruvchain*.ipk
