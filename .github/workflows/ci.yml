name: Ruvchain

on:
  push:
  pull_request:
  release:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/checkout@v4
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: --issues-exit-code=1

  codeql:
    name: Analyse
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        goversion: ["1.21", "1.22", "1.23","1.24"]

    name: Build & Test (Linux, Go ${{ matrix.goversion }})
    needs: [lint]

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.goversion }}

      - name: Build Ruvchain
        run: go build -v ./...

      - name: Unit tests
        run: go test -v ./...

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        goversion: ["1.21", "1.22", "1.23","1.24"]

    name: Build & Test (Windows, Go ${{ matrix.goversion }})
    needs: [lint]

    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.goversion }}

      - name: Build Ruvchain
        run: go build -v ./...

      - name: Unit tests
        run: go test -v ./...

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        goversion: ["1.21", "1.22", "1.23","1.24"]

    name: Build & Test (macOS, Go ${{ matrix.goversion }})
    needs: [lint]

    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.goversion }}

      - name: Build Ruvchain
        run: go build -v ./...

      - name: Unit tests
        run: go test -v ./...

  build-freebsd:
    strategy:
      fail-fast: false
      matrix:
        goversion: ["1.21", "1.22", "1.23","1.24"]
        goos:
          - freebsd
          - openbsd

    name: Build (Cross ${{ matrix.goos }}, Go ${{ matrix.goversion }})
    needs: [lint]

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.goversion }}

      - name: Build Ruvchain
        run: go build -v ./...
        env:
          GOOS: ${{ matrix.goos }}

  build-android:
  strategy:
    fail-fast: false
    matrix:
      goversion: ["1.21", "1.22", "1.23", "1.24"]
      arch: [arm64, arm]

  name: Build Android (${{ matrix.arch }}, Go ${{ matrix.goversion }})
  needs: [lint]

  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.goversion }}

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: 26.2.11394342

    - name: Build for Android
      run: |
        export CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang
        export CXX=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++

        GOOS=android GOARCH=${{ matrix.arch }} \
        CGO_ENABLED=1 \
        go build -v -buildmode=c-shared -o ./build/android/${{ matrix.arch }}/libruvchain.so ./...

    - name: Run Android tests
      if: matrix.arch == 'arm64'
      run: |
        adb start-server
        adb shell am instrument -w -r -e debug false \
        -e class com.example.ruvchain.TestSuite \
        com.example.ruvchain.test/androidx.test.runner.AndroidJUnitRunner

  tests-ok:
    name: All tests passed
    needs: [lint, codeql, build-linux, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Check all tests passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
