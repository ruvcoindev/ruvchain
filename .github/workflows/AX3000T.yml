name: Build OpenWrt for Xiaomi AX3000T

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-openwrt:
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncurses-dev \
          flex \
          bison \
          gawk \
          gcc-multilib \
          git \
          rsync \
          python3-full \
          unzip \
          zlib1g-dev

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/staging_dir
          openwrt/build_dir
        key: ${{ runner.os }}-openwrt-${{ hashFiles('**/feeds.conf.default') }}-${{ hashFiles('.config') }}

    - name: Clone OpenWrt
      run: |
        git clone --depth=1 https://github.com/openwrt/openwrt.git -b v23.05.5

    - name: Configure feeds
      run: |
        cd openwrt
        echo 'src-git ruvchain https://github.com/ruvcoindev/package.git' >> feeds.conf.default
        echo 'src-git ruvchain_luci https://github.com/ruvcoindev/luci.git' >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a -p ruvchain  ruvchain-connector luci-proto-ruvchain

    - name: Apply device config
      run: |
        cd openwrt
        cat > .config << EOF
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_mt7981=y
        CONFIG_TARGET_mediatek_mt7981_ax3000t=y
        CONFIG_PACKAGE_ruvchain=y
        CONFIG_PACKAGE_ruvchain-connector=y
        CONFIG_PACKAGE_ruvchainctl=y
        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_libopenssl=y
        CONFIG_PACKAGE_libatomic=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-compat=y
        CONFIG_LUCI_LANG_ru=y
        CONFIG_LUCI_LANG_en=y
        CONFIG_OPENSSL_OPTIMIZE_SPEED=y
        CONFIG_PACKAGE_ruvchain-connector=y
        CONFIG_PACKAGE_luci-proto-ruvchain=y
        CONFIG_LUCI_LANG_ru=y
        CONFIG_LUCI_LANG_en=y
        EOF

    - name: Build firmware
      run: |
        cd openwrt
        make defconfig
        make -j$(nproc) download
        make -j$(($(nproc + 1))) V=s

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-ax3000t
        path: |
          openwrt/bin/targets/mediatek/mt7981/*sysupgrade.bin
          openwrt/bin/packages/aarch64_cortex-a53/ruvchain*.ipk
          openwrt/bin/packages/aarch64_cortex-a53/luci-proto-ruvchain*.ipk
          openwrt/bin/packages/aarch64_cortex-a53/ruvchain-connector*.ipk
