name: Build OpenWrt for Xiaomi AX3000T

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TARGET: mediatek/mt7981
  PROFILE: xiaomi_ax3000t
  GO_VERSION: 1.22.6
  RUST_VERSION: 1.76.0

jobs:
  build-openwrt:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncurses-dev \
          flex \
          bison \
          gperf \
          gawk \
          gcc-multilib \
          git \
          rsync \
          python3-full \
          unzip \
          zlib1g-dev \
          libssl-dev \
          pkg-config \
          curl \
          cmake \
          ninja-build

    - name: Install Go
      run: |
        curl -L https://go.dev/dl/go${{ env.GO_VERSION }}.linux-amd64.tar.gz | sudo tar -C /usr/local -xz
        echo "PATH=$PATH:/usr/local/go/bin" >> $GITHUB_ENV

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain ${{ env.RUST_VERSION }}
        echo "PATH=$PATH:$HOME/.cargo/bin" >> $GITHUB_ENV
        rustup target add aarch64-unknown-linux-musl

    - name: Cache Dependencies
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/staging_dir
          openwrt/build_dir
          ~/.cargo/registry
          ~/.go/pkg
        key: ${{ runner.os }}-openwrt-${{ hashFiles('**/feeds.conf.default', '**/.config') }}

    - name: Clone OpenWrt
      run: |
        git clone --depth=1 https://github.com/openwrt/openwrt.git -b v23.05.5

    - name: Configure Feeds
      run: |
        cd openwrt
        cat > feeds.conf.default << EOF
        src-git packages https://github.com/openwrt/packages.git
        src-git routing https://github.com/openwrt/routing.git
        src-git ruvchain https://github.com/ruvcoindev/package.git
        src-git ruvchain_luci https://github.com/ruvcoindev/luci-proto-ruvchain.git
        EOF

        ./scripts/feeds update -a
        ./scripts/feeds install -a -p ruvchain
        ./scripts/feeds install -a -p ruvchain_luci
        ./scripts/feeds install \
          golang \
          rust \
          ruvchain-connector \
          luci-proto-ruvchain

    - name: Configure Target
      run: |
        cd openwrt
        cat > .config << EOF
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_mt7981=y
        CONFIG_TARGET_mediatek_mt7981_${{ env.PROFILE }}=y
        
        # Ruvchain
        CONFIG_PACKAGE_ruvchain=y
        CONFIG_PACKAGE_ruvchain-connector=y
        CONFIG_PACKAGE_ruvchainctl=y
        CONFIG_PACKAGE_luci-proto-ruvchain=y
        
        # Dependencies
        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_PACKAGE_libopenssl=y
        CONFIG_PACKAGE_libatomic=y
        CONFIG_OPENSSL_OPTIMIZE_SPEED=y
        
        # Go
        CONFIG_PACKAGE_golang=y
        CONFIG_PACKAGE_golang-bin=y
        
        # Rust
        CONFIG_PACKAGE_rust=y
        CONFIG_PACKAGE_rustc=y
        CONFIG_RUSTC_TARGET="aarch64-unknown-linux-musl"
        
        # LuCI
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-compat=y
        CONFIG_LUCI_LANG_en=y
        CONFIG_LUCI_LANG_ru=y
        CONFIG_PACKAGE_luci-theme-bootstrap=y
        EOF

    - name: Build Toolchain
      run: |
        cd openwrt
        make defconfig
        make toolchain/install V=s
        make package/golang/compile V=s
        make package/rust/compile V=s

    - name: Build Firmware
      run: |
        cd openwrt
        make -j$(nproc) download
        make -j$(($(nproc) + 1)) V=s

    - name: Collect Artifacts
      run: |
        mkdir -p artifacts
        cp openwrt/bin/targets/${{ env.TARGET }}/*sysupgrade.bin artifacts/
        cp openwrt/bin/packages/aarch64_generic/{ruvchain*,luci-*} artifacts/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-${{ env.PROFILE }}
        path: artifacts/*
